name: Build NovaShell Windows Installer

# Runs on every push to master/main and can be triggered manually from the
# Actions tab. Produces NovaShell-Setup.exe as a downloadable artifact, and
# publishes a GitHub Release when a version tag (v*) is pushed.
on:
  push:
    branches: [master, main]
    tags: ['v*']
    # docs and memory notes don't need a 20-min Windows build
    paths-ignore:
      - '**.md'
      - 'v0_memories/**'
  workflow_dispatch:

# a newer push supersedes any still-running build of the same branch
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# contents: write is required for the release-publish step (default token is read-only)
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (standalone server)
        run: pnpm build

      - name: Prepare embedded server resources
        shell: pwsh
        run: |
          $app = "src-tauri/resources/app"
          New-Item -ItemType Directory -Force -Path $app | Out-Null
          # standalone server bundle (server.js + pruned node_modules)
          Copy-Item -Recurse -Force .next/standalone/* $app
          # static assets + public files the standalone bundle expects
          New-Item -ItemType Directory -Force -Path "$app/.next/static" | Out-Null
          Copy-Item -Recurse -Force .next/static/* "$app/.next/static"
          if (Test-Path public) { Copy-Item -Recurse -Force public "$app/public" }
          # portable Node runtime so users don't need Node installed
          New-Item -ItemType Directory -Force -Path src-tauri/resources/node | Out-Null
          Copy-Item (Get-Command node).Source src-tauri/resources/node/node.exe

      - name: Build Tauri app (NSIS installer)
        run: pnpm dlx @tauri-apps/cli@latest build
        env:
          CI: true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaShell-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
